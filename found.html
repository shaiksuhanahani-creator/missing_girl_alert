<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Report Found Person</title>
</head>
<body>

<h2>Report a Found Person</h2>

<form action="submit_found.php" method="POST">
    
    <label>Person Name (if known):</label><br>
    <input type="text" name="name" placeholder="Enter name"><br><br>

    <label>Approximate Age:</label><br>
    <input type="number" name="age" placeholder="Enter age"><br><br>

    <label>Location Found:</label><br>
    <input type="text" name="location" placeholder="Where was the person found?"><br><br>

    <button type="submit">Submit Report</button>

</form>

</body>
</html>
